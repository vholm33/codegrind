<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Homepage</title>
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22></text></svg>"
        />

        <link rel="stylesheet" href="./src/index.css" />
    </head>
    <body class="bg-gray-900 text-white">
        <header id="toolbar" class="grid h-14 grid-cols-3 items-center border-b-2 bg-gray-950 p-4"></header>

        <!-- Container: Sidebar + Main -->
        <div class="flex">
            <!-- Sidebar -->
            <aside class="flex h-screen">
                <div
                    id="sidebar-container"
                    class="w-14 bg-gradient-to-b from-gray-800 to-gray-900 transition-all duration-300"
                ></div>
            </aside>

            <main class="m-4 flex flex-1 flex-col">
                <!-- Statistics -->
                <section class="rounded-md border bg-gray-950">
                    <header>
                        <button
                            class="m-4 rounded-full border bg-blue-500 p-6 text-2xl font-semibold hover:bg-blue-600"
                        >
                            <a href="./src/pages/quizSession/quizSession.html">Master Quiz</a>
                        </button>
                    </header>

                    <ul class="mb-6 flex justify-around">
                        <li></li>
                        <li>
                            <button class="rounded-md border bg-blue-500 p-4 hover:bg-blue-600">
                                <a href="./src/pages/ratings/ratings.html">Se kodfrågor</a>
                            </button>
                        </li>
                    </ul>
                </section>

                <!-- Individuella Quiz -->
                <section class="mt-4 rounded-md border bg-gray-950 p-4">
                    <header class="m-4">Starta individuella quiz</header>
                    <div class="m-4 grid grid-rows-4 gap-2 rounded-md bg-slate-800 p-2">
                        <div class="grid grid-cols-2 items-center">
                            <div class="flex justify-center">
                                <button
                                    class="flex w-1/2 justify-center rounded-md border bg-blue-500 p-4 hover:bg-blue-600"
                                >
                                    <a href="./src/pages/quizSession/quizSession.html?category=Konstanter"
                                        >Konstanter</a
                                    >
                                </button>
                            </div>
                            <p class="text-center">Frågor: <span id="konstanter-amount"></span></p>
                        </div>
                        <div class="grid grid-cols-2 items-center">
                            <div class="flex justify-center">
                                <button
                                    class="flex w-1/2 justify-center rounded-md border bg-blue-500 p-4 hover:bg-blue-600"
                                >
                                    <a href="./src/pages/quizSession/quizSession.html?category=Typescript"
                                        >TypeScript</a
                                    >
                                </button>
                            </div>
                            <p class="text-center">Frågor: <span id="ts-amount"></span></p>
                        </div>
                        <div class="grid grid-cols-2 items-center">
                            <div class="flex justify-center">
                                <button
                                    class="flex w-1/2 justify-center rounded-md border bg-blue-500 p-4 hover:bg-blue-600"
                                >
                                    <a href="./src/pages/quizSession/quizSession.html?category=Loopar">Loopar</a>
                                </button>
                            </div>
                            <p class="text-center">Frågor: <span id="loopar-amount"></span></p>
                        </div>
                        <div class="grid grid-cols-2 items-center">
                            <div class="flex justify-center">
                                <button
                                    class="flex w-1/2 justify-center rounded-md border bg-blue-500 p-4 hover:bg-blue-600"
                                >
                                    <a href="./src/pages/quizSession/quizSession.html?category=Metoder">Metoder</a>
                                </button>
                            </div>
                            <p class="text-center">Frågor: <span id="metoder-amount"></span></p>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </body>
    <script type="module" src="./src/utils/initToolbarSidebar.ts"></script>
    <script type="module" src="./index.ts"></script>
</html>
