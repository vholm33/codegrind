<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Register</title>
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22></text></svg>"
        />
        <link rel="stylesheet" href="../../index.css" />
    </head>
    <body class="bg-gray-900 text-white">
        <header id="toolbar" class="grid h-14 grid-cols-3 items-center border-b-2 bg-gray-950 p-4"></header>

        <!-- Container: Sidebar + Main -->
        <div class="flex">
            <!-- Sidebar -->
            <aside class="flex h-screen">
                <div
                    id="sidebar-container"
                    class="w-14 bg-gradient-to-b from-gray-800 to-gray-900 transition-all duration-300"
                ></div>
            </aside>

            <main class="m-4 flex flex-1 flex-col">
                <!-- Form container -->
                <section class="mt-12 flex justify-center">
                    <form class="flex w-96 flex-col items-center rounded-md border-2 bg-gray-800 p-4">
                        <header class="mb-4 w-full border-b text-center text-xl font-semibold">
                            <h1>Register</h1>
                        </header>
                        <!-- Input container -->
                        <div class="grid w-full grid-rows-3 gap-5">
                            <div class="flex flex-col">
                                <label class="flex" for="email">Email:</label>
                                <input
                                    class="rounded border bg-gray-900 p-2"
                                    type="text"
                                    id="email"
                                    placeholder="user@me.com..."
                                />
                            </div>
                            <div class="flex flex-col">
                                <label for="username">Username:</label>
                                <input
                                    class="rounded border bg-gray-900 p-2"
                                    type="text"
                                    id="username"
                                    placeholder="CoolCoder"
                                />
                            </div>
                            <div class="flex flex-col">
                                <label for="password">Password:</label>
                                <input
                                    class="rounded border bg-gray-900 p-2"
                                    type="password"
                                    id="password"
                                    placeholder="******"
                                />
                            </div>
                            <p class="text-sm text-gray-300">
                                By creating an account, you acknowledge that we process your personal data as described
                                in our
                                <a href="./privacy.html" class="text-blue-400 underline">Privacy Policy</a>.
                            </p>

                            <label class="flex items-start gap-2 text-sm text-gray-200">
                                <input type="checkbox" name="consent" required class="mt-1" />
                                <span>I have read and agree to the Privacy Policy.</span>
                            </label>
                        </div>
                        <button class="mt-4 w-1/2 rounded-md bg-blue-500 hover:bg-blue-700">Submit</button>
                    </form>
                </section>
            </main>
        </div>
    </body>
    <script type="module" src="../../utilities/initToolbarSidebar.ts"></script>
    <!-- <script type="module" src="./register.js"></script> -->
    <script type="module" src="./register.ts"></script>
</html>
