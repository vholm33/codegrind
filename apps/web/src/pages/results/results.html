<!doctype html>
<html lang="sv">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quiz Summary</title>
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22></text></svg>"
        />

        <link rel="stylesheet" href="../../index.css" />
    </head>
    <body class="bg-gray-900 text-white">
        <header id="toolbar" class="grid h-14 grid-cols-3 items-center border-b-2 bg-gray-950 p-4"></header>

        <div class="flex">
            <aside class="flex h-screen">
                <div
                    id="sidebar-container"
                    class="w-14 bg-gradient-to-b from-gray-800 to-gray-900 transition-all duration-300"
                ></div>
            </aside>

            <main class="m-4 flex w-screen flex-1 flex-col gap-4">
                <section class="rounded-md border-2 bg-gray-800 p-6">
                    <div class="mb-6 flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between">
                        <div>
                            <p id="session-tag" class="mt-2 text-2xl font-semibold text-cyan-300 md:text-3xl">Username</p>
                            <h2 class="mt-2 max-w-3xl text-3xl font-semibold leading-tight text-white md:text-4xl">
                                Here are the results from your quiz.
                            </h2>
                        </div>

                        <div class="grid w-full max-w-xs gap-3">
                            <div class="rounded-md border bg-gray-900 p-5">
                                <p class="text-sm uppercase tracking-[0.18em] text-gray-400">Total points</p>
                                <p id="score-value" class="mt-3 text-5xl font-semibold leading-none text-white">0</p>
                            </div>
                        </div>
                    </div>

                    <div id="session-metrics" class="grid gap-4 md:grid-cols-2 xl:grid-cols-4"></div>
                </section>

                <section class="grid gap-4 xl:grid-cols-2">
                    <article class="rounded-md border-2 bg-gray-800 p-6">
                        <div class="mb-5">
                            <p class="text-sm uppercase tracking-[0.18em] text-gray-400">Key metrics</p>
                        </div>
                        <div id="session-highlights" class="grid gap-3"></div>
                    </article>

                    <article class="rounded-md border-2 bg-gray-800 p-6">
                        <div class="mb-5">
                            <p class="text-sm uppercase tracking-[0.18em] text-gray-400">Category breakdown</p>
                        </div>
                        <div id="category-breakdown" class="grid gap-4"></div>
                    </article>
                </section>

                <section class="rounded-md border-2 bg-gray-800 p-6">
                    <div class="mb-5">
                        <p class="text-sm uppercase tracking-[0.18em] text-gray-400">Session questions</p>
                    </div>
                    <div id="question-timeline" class="grid gap-4 md:grid-cols-2 2xl:grid-cols-4"></div>
                </section>
            </main>
        </div>

        <script type="module" src="../../utils/initToolbarSidebar.ts"></script>
        <script type="module" src="./results.ts"></script>
    </body>
</html>
