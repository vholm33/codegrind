<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quiz Session</title>
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22></text></svg>"
        />

        <link rel="stylesheet" href="../../index.css" />
    </head>
    <body class="bg-gray-900 text-white">
        <header id="toolbar" class="grid h-14 grid-cols-3 items-center border-b-2 bg-gray-950 p-4"></header>

        <!-- Container: Sidebar + Main -->
        <div class="flex">
            <!-- Sidebar -->
            <aside class="flex h-screen">
                <div
                    id="sidebar-container"
                    class="w-14 bg-gradient-to-b from-gray-800 to-gray-900 transition-all duration-300"
                ></div>
            </aside>

            <main class="m-4 flex w-screen flex-1 flex-col">
                <!-- Form container to add problems to -->
                <section class="mt-12 flex justify-center">
                    <form class="flex w-full flex-col items-center rounded-md border-2 bg-gray-800 p-4">
                        <header class="mb-4 w-full border-b p-2 text-center text-xl font-semibold">
                            <!-- Statusbar -->
                            <!--
                                1. Progress Bar
                                2. Questions Left
                            -->
                            <div class="flex gap-2" id="progress-bar-container">
                                <!-- Fråga n/x -->
                                <div
                                    class="flex flex-1 tracking-widest rounded-md border bg-slate-800 p-2 px-4 text-blue-500"
                                    id="progress-xn"
                                ></div>

                                <div class="w-full">
                                    <progress id="status" class="ml-4 h-3 w-4/5 rounded-full"></progress> <!-- bg-slate-600 !accent-green-500 -->
                                    <label for="status"></label>
                                    <span class="p-4 text-sm" id="progress-percentage"></span>
                                </div>
                            </div>
                        </header>

                        <!-- Title + Description -->
                        <!--   <div class="flex w-full justify-around">

                            <div class="flex flex-col">
                                <select id="code-category" class="bg-gray-900 p-2">
                                    <option value=""></option>
                                </select>
                            </div>
                        </div> -->

                        <!-- Grid Input container -->
                        <div class="grid w-full grid-cols-1 gap-6">
                            <div class="flex items-center gap-4">
                                <div
                                    class="shrink-0 text-xl rounded-full border bg-gray-950 p-2 m-2 px-4 font-semibold"
                                    id="category-name"
                                ></div>
                                <div class="flex-1 tracking-wider mr-2 text-balande rounded border bg-gray-900 p-6 text-xl" id="code-question"></div>
                            </div>
                            <div class="flex flex-col">
                                <!-- FEEDBACK om för kort svar -->
                                <div id="feedback" class="hidden"></div>
                                <label for="code-answer">Kod-svar</label>
                                <div id="code-editor-container" class="rounded-md bg-gray-900 p-2"></div>
                                <!-- <textarea
                                    class="rounded border bg-gray-900 p-2"
                                    type="text"
                                    id="code-answer"
                                    placeholder="Skriv in kod-svar"
                                ></textarea> -->
                            </div>
                        </div>
                        <button
                            class="mt-4 w-1/2 rounded-md border-2 border-blue-600 bg-blue-500 hover:border hover:bg-blue-700"
                        >
                            Submit
                        </button>
                    </form>
                </section>
            </main>
        </div>
    </body>
    <script type="module" src="../../utils/initToolbarSidebar.ts"></script>
    <script type="module" src="./quizSession.ts"></script>
</html>
