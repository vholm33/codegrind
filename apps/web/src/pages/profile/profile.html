<!doctype html>
<html lang="sv">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Profile Stats</title>
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22></text></svg>"
        />
        <link rel="stylesheet" href="../../index.css" />
    </head>
    <body class="bg-gray-900 text-white">
        <header id="toolbar" class="grid h-14 grid-cols-3 items-center border-b-2 bg-gray-950 p-4"></header>

        <div class="flex">
            <aside class="flex h-screen">
                <div
                    id="sidebar-container"
                    class="w-14 bg-gradient-to-b from-gray-800 to-gray-900 transition-all duration-300"
                ></div>
            </aside>

            <main class="m-4 flex w-screen flex-1 flex-col gap-4">
                <!-- Hantera personuppgifter -->
                <section class="flex w-full items-center justify-center">
                    <button class="my-8 flex items-center justify-center rounded-full p-4 font-semibold">
                        <a class="flex items-center justify-center" href="./edit-profile.html"
                            >Hantera kontouppgifter</a
                        >
                    </button>
                </section>
                <section class="rounded-md border-2 bg-gray-800 p-6">
                    <div class="mb-6 flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between">
                        <div>
                            <p id="profile-tag" class="text-3xl font-semibold leading-tight text-cyan-300 md:text-4xl">
                                Username
                            </p>
                        </div>

                        <div
                            class="grid h-44 w-44 shrink-0 place-items-center rounded-full border-8 border-amber-300/30 bg-gray-950 text-center shadow-inner"
                        >
                            <div class="grid place-items-center">
                                <span class="text-sm text-gray-400">Best score</span>
                                <span
                                    id="profile-best-score"
                                    class="mt-2 text-5xl font-semibold leading-none text-white"
                                    >0</span
                                >
                            </div>
                        </div>
                    </div>

                    <div id="profile-metrics" class="grid gap-4 md:grid-cols-2 xl:grid-cols-4"></div>
                </section>

                <section class="grid gap-4 xl:grid-cols-2">
                    <article class="rounded-md border-2 bg-gray-800 p-6">
                        <div class="mb-5">
                            <p class="text-sm uppercase tracking-[0.18em] text-gray-400">Recent sessions</p>
                            <h2 class="mt-2 text-2xl font-semibold">Score trend</h2>
                        </div>
                        <div id="score-trend" class="min-h-[280px]"></div>
                    </article>

                    <article class="rounded-md border-2 bg-gray-800 p-6">
                        <div class="mb-5">
                            <p class="text-sm uppercase tracking-[0.18em] text-gray-400">Categories</p>
                            <h2 class="mt-2 text-2xl font-semibold">Category accuracy</h2>
                        </div>
                        <div id="profile-categories" class="grid gap-4"></div>
                    </article>
                </section>

                <section class="rounded-md border-2 bg-gray-800 p-6">
                    <div class="mb-5">
                        <p class="text-sm uppercase tracking-[0.18em] text-gray-400">History</p>
                        <h2 class="mt-2 text-2xl font-semibold">Past sessions</h2>
                    </div>
                    <div id="profile-history" class="grid gap-3"></div>
                </section>
            </main>
        </div>

        <script type="module" src="../../utils/initToolbarSidebar.ts"></script>
        <script type="module" src="./profile.ts"></script>
    </body>
</html>
