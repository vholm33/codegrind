<!doctype html>
<html lang="sv">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Redigera profil</title>
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22></text></svg>"
        />
        <link rel="stylesheet" href="../../index.css" />
    </head>
    <body class="bg-gray-900 text-white">
        <header id="toolbar" class="grid h-14 grid-cols-3 items-center border-b-2 bg-gray-950 p-4"></header>

        <div class="flex">
            <aside class="flex h-screen">
                <div
                    id="sidebar-container"
                    class="w-14 bg-gradient-to-b from-gray-800 to-gray-900 transition-all duration-300"
                ></div>
            </aside>

            <main class="m-4 flex w-screen flex-1 flex-col">
                <section class="mt-12 flex justify-center">
                    <form id="edit-profile-form" class="flex w-full max-w-3xl flex-col rounded-md border-2 bg-gray-800 p-6">
                        <header class="mb-6 border-b pb-4">
                            <p class="text-sm uppercase tracking-[0.18em] text-gray-400">Account</p>
                            <h2 class="mt-2 text-2xl font-semibold">Profile settings</h2>
                        </header>

                        <div class="grid gap-4">
                            <article
                                class="rounded-md border border-gray-700 bg-gray-900/70 p-5 transition-colors"
                                data-field-card="username"
                            >
                                <div class="flex items-start justify-between gap-4">
                                    <div>
                                        <p class="text-xs uppercase tracking-[0.18em] text-gray-500">Username</p>
                                        <p id="username-display" class="mt-3 text-lg font-semibold text-white">Loading...</p>
                                    </div>
                                    <button
                                        class="rounded-md border border-gray-600 px-4 py-2 text-sm font-medium text-white transition hover:border-blue-500 hover:text-blue-300"
                                        type="button"
                                        data-edit-button="username"
                                    >
                                        Edit
                                    </button>
                                </div>

                                <div class="mt-4 hidden" data-edit-panel="username">
                                    <label class="mb-2 block text-sm text-gray-400" for="username">New username</label>
                                    <input
                                        class="w-full rounded-md border border-gray-600 bg-gray-950 px-3 py-2 text-white outline-none transition focus:border-blue-500"
                                        id="username"
                                        type="text"
                                    />
                                    <div class="mt-3 flex justify-end">
                                        <button
                                            class="rounded-md border border-gray-600 px-4 py-2 text-sm font-medium text-gray-300 transition hover:border-gray-400 hover:text-white"
                                            type="button"
                                            data-cancel-button="username"
                                        >
                                            Cancel
                                        </button>
                                    </div>
                                </div>
                            </article>

                            <article
                                class="rounded-md border border-gray-700 bg-gray-900/70 p-5 transition-colors"
                                data-field-card="email"
                            >
                                <div class="flex items-start justify-between gap-4">
                                    <div>
                                        <p class="text-xs uppercase tracking-[0.18em] text-gray-500">Email</p>
                                        <p id="email-display" class="mt-3 text-lg font-semibold text-white">Loading...</p>
                                    </div>
                                    <button
                                        class="rounded-md border border-gray-600 px-4 py-2 text-sm font-medium text-white transition hover:border-blue-500 hover:text-blue-300"
                                        type="button"
                                        data-edit-button="email"
                                    >
                                        Edit
                                    </button>
                                </div>

                                <div class="mt-4 hidden" data-edit-panel="email">
                                    <label class="mb-2 block text-sm text-gray-400" for="email">New email</label>
                                    <input
                                        class="w-full rounded-md border border-gray-600 bg-gray-950 px-3 py-2 text-white outline-none transition focus:border-blue-500"
                                        id="email"
                                        type="email"
                                    />
                                    <div class="mt-3 flex justify-end">
                                        <button
                                            class="rounded-md border border-gray-600 px-4 py-2 text-sm font-medium text-gray-300 transition hover:border-gray-400 hover:text-white"
                                            type="button"
                                            data-cancel-button="email"
                                        >
                                            Cancel
                                        </button>
                                    </div>
                                </div>
                            </article>

                            <article
                                class="rounded-md border border-gray-700 bg-gray-900/70 p-5 transition-colors"
                                data-field-card="password"
                            >
                                <div class="flex items-start justify-between gap-4">
                                    <div>
                                        <p class="text-xs uppercase tracking-[0.18em] text-gray-500">Password</p>
                                        <p id="password-display" class="mt-3 text-lg font-semibold text-white">••••••••</p>
                                    </div>
                                    <button
                                        class="rounded-md border border-gray-600 px-4 py-2 text-sm font-medium text-white transition hover:border-blue-500 hover:text-blue-300"
                                        type="button"
                                        data-edit-button="password"
                                    >
                                        Edit
                                    </button>
                                </div>

                                <div class="mt-4 hidden" data-edit-panel="password">
                                    <label class="mb-2 block text-sm text-gray-400" for="password">New password</label>
                                    <input
                                        class="w-full rounded-md border border-gray-600 bg-gray-950 px-3 py-2 text-white outline-none transition focus:border-blue-500"
                                        id="password"
                                        type="password"
                                        placeholder="Leave empty to keep the current password"
                                    />
                                    <div class="mt-3 flex justify-end">
                                        <button
                                            class="rounded-md border border-gray-600 px-4 py-2 text-sm font-medium text-gray-300 transition hover:border-gray-400 hover:text-white"
                                            type="button"
                                            data-cancel-button="password"
                                        >
                                            Cancel
                                        </button>
                                    </div>
                                </div>
                            </article>
                        </div>

                        <div id="profile-status" class="mt-5 hidden rounded border p-3 text-sm"></div>

                        <button
                            class="mt-6 w-full rounded-md border-2 border-blue-600 bg-blue-500 py-2 font-semibold text-white transition hover:border hover:bg-blue-700"
                            type="submit"
                        >
                            Save changes
                        </button>
                    </form>
                </section>
            </main>
        </div>

        <script type="module" src="../../utils/initToolbarSidebar.ts"></script>
        <script type="module" src="./edit-profile.ts"></script>
    </body>
</html>
