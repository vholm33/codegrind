<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login</title>
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22></text></svg>"
        />

        <link rel="stylesheet" href="./index.css" />
    </head>
    <body class="bg-gray-900 text-white">
        <header class="grid h-14 grid-cols-3 items-center border-b-2 bg-gray-950 p-4">
            <a href="../index.html">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="size-6"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"
                    />
                </svg>
            </a>
            <h1 class="text-center text-2xl font-semibold">CodeGrind</h1>
            <!-- Register: om inte har inlogg  -->
            <button class="text-md w-24 justify-self-end rounded-md bg-blue-500 font-semibold">
                <a href="./register.html">Register</a>
            </button>
        </header>

        <!-- Container: Sidebar + Main -->
        <div class="flex">
            <!-- Sidebar -->
            <aside class="flex h-screen">
                <div id="sidebar-container" class="w-14 bg-gradient-to-b from-gray-800 to-gray-900 transition-all duration-300"></div>
            </aside>

            <main class="m-4 flex flex-1 flex-col">
                <!-- Form container -->
                <section class="mt-12 flex justify-center">
                    <form class="flex w-96 flex-col items-center rounded-md border-2 bg-gray-800 p-4">
                        <header class="mb-4 w-full border-b text-center text-xl font-semibold">
                            <h1>Login</h1>
                        </header>
                        <!-- Input container -->
                        <div class="grid w-full grid-rows-2 gap-5">
                            <div class="flex flex-col">
                                <label for="email">Username:</label>
                                <input
                                    class="rounded border bg-gray-900 p-2"
                                    type="text"
                                    id="username"
                                    placeholder="CoolCoder"
                                />
                            </div>
                            <div class="flex flex-col">
                                <label for="password">Password:</label>
                                <input
                                    class="rounded border bg-gray-900 p-2"
                                    type="password"
                                    id="password"
                                    placeholder="******"
                                />
                            </div>
                        </div>
                        <button
                            class="mt-4 w-1/2 rounded-md border-2 border-blue-600 bg-blue-500 hover:border hover:bg-blue-700"
                        >
                            Submit
                        </button>
                    </form>
                </section>
            </main>
        </div>
    </body>
    <script type="module" src="./utilities/sidebar.js"></script>
    <script type="module" src="./login.ts"></script>
</html>
